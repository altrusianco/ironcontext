name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: |
          rustup default stable
          rustc --version
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build (release)
        run: cargo build --release --workspace
      - name: Cargo test
        run: cargo test --release --workspace
      - name: Latency gate (<10ms)
        run: ./target/release/ironcontext bench fixtures/large_manifest.json --iterations 300 --budget-ms 10
      - name: Optimizer gate (≥40%)
        run: ./target/release/ironcontext optimize fixtures/large_manifest.json --require-reduction-pct 40
      - name: Python wrapper tests
        run: |
          python3 -m pip install --upgrade pip
          PYTHONPATH=python python3 -m unittest discover -s python/tests -v

  self-scan:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run IronContext on the poisoned fixture
        uses: ./.github/actions/ironcontext
        with:
          manifest: fixtures/poisoned_manifest.json
          fail-on: never
          output-sarif: ironcontext.sarif
          budget-ms: 10
