name: Release

# Trigger: push a SemVer tag like v0.1.0.
# Publishes the two Cargo crates to crates.io in dependency order, then the
# Python wheel + sdist to PyPI.
#
# Idempotent: if the version is already published on a given registry, that
# registry's step skips cleanly. This lets you tag retroactively (e.g. for
# v0.1.0, which was first published from a local workstation) without the
# workflow failing.
#
# Required repo secrets / OIDC:
#   * CARGO_REGISTRY_TOKEN  — crates.io API token with publish-update scope.
#   * For PyPI we prefer **trusted publishing** (no token). Configure the
#     `ironcontext` project on pypi.org with this workflow as a trusted
#     publisher. If you prefer a token, add PYPI_API_TOKEN and uncomment
#     the `password:` line in the publish step.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      core_published: ${{ steps.published.outputs.core }}
      cli_published: ${{ steps.published.outputs.cli }}
      pypi_published: ${{ steps.published.outputs.pypi }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup default stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build release
        run: cargo build --release --workspace
      - name: Full make test (cargo + bench + optimizer + python + action)
        run: make test
      - name: Resolve version + confirm tag matches workspace
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          WS_VER=$(awk -F\" '/^version = / {print $2; exit}' Cargo.toml)
          if [ "$TAG" != "$WS_VER" ]; then
            echo "::error::tag v$TAG does not match Cargo.toml version $WS_VER"
            exit 1
          fi
          echo "version=$WS_VER" >> "$GITHUB_OUTPUT"
      - name: Detect already-published versions (idempotency)
        id: published
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          # `cargo info <crate>@<version>` exits 0 only if the registry serves
          # that exact version. This is more reliable than the HTTP API which
          # caches inconsistently.
          check_crate() {
            local crate="$1"
            if cargo info "${crate}@${VER}" >/dev/null 2>&1; then
              echo "true"
            else
              echo "false"
            fi
          }
          check_pypi() {
            local code
            code=$(curl -sL -A "ironcontext-release/1" \
              -o /dev/null -w "%{http_code}" \
              "https://pypi.org/pypi/ironcontext/${VER}/json")
            [ "$code" = "200" ] && echo "true" || echo "false"
          }
          CORE=$(check_crate ironcontext-core)
          CLI=$(check_crate ironcontext-cli)
          PYPI=$(check_pypi)
          echo "core=$CORE"   >> "$GITHUB_OUTPUT"
          echo "cli=$CLI"     >> "$GITHUB_OUTPUT"
          echo "pypi=$PYPI"   >> "$GITHUB_OUTPUT"
          echo "ironcontext-core@$VER published: $CORE"
          echo "ironcontext-cli@$VER  published: $CLI"
          echo "ironcontext@$VER       on PyPI: $PYPI"

  publish-crates:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup default stable

      - name: Skip if both crates already published
        if: ${{ needs.verify.outputs.core_published == 'true' && needs.verify.outputs.cli_published == 'true' }}
        run: |
          echo "::notice::both crates already at v${{ needs.verify.outputs.version }} on crates.io — nothing to do"

      - name: Dry-run package (size check)
        if: ${{ needs.verify.outputs.core_published != 'true' || needs.verify.outputs.cli_published != 'true' }}
        run: |
          cargo package -p ironcontext-core --allow-dirty
          cargo package -p ironcontext-cli  --allow-dirty || true
          du -h target/package/*.crate || true

      - name: Publish ironcontext-core
        if: ${{ needs.verify.outputs.core_published != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -o pipefail
          if cargo publish -p ironcontext-core 2>&1 | tee /tmp/core.log; then
            exit 0
          fi
          if grep -q "already exists on crates.io" /tmp/core.log; then
            echo "::notice::ironcontext-core@${{ needs.verify.outputs.version }} already on crates.io — treating as success"
            exit 0
          fi
          exit 1

      - name: Wait for crates.io index update
        if: ${{ needs.verify.outputs.core_published != 'true' }}
        run: |
          for i in $(seq 1 30); do
            if cargo search ironcontext-core | grep -q "^ironcontext-core ="; then
              echo "index updated."; exit 0
            fi
            sleep 10
          done
          echo "::error::ironcontext-core never appeared on crates.io"
          exit 1

      - name: Publish ironcontext-cli
        if: ${{ needs.verify.outputs.cli_published != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -o pipefail
          if cargo publish -p ironcontext-cli 2>&1 | tee /tmp/cli.log; then
            exit 0
          fi
          if grep -q "already exists on crates.io" /tmp/cli.log; then
            echo "::notice::ironcontext-cli@${{ needs.verify.outputs.version }} already on crates.io — treating as success"
            exit 0
          fi
          exit 1

  publish-pypi:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Skip if already published
        if: ${{ needs.verify.outputs.pypi_published == 'true' }}
        run: |
          echo "::notice::ironcontext v${{ needs.verify.outputs.version }} already on PyPI — nothing to do"

      - uses: actions/setup-python@v5
        if: ${{ needs.verify.outputs.pypi_published != 'true' }}
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        if: ${{ needs.verify.outputs.pypi_published != 'true' }}
        run: |
          python -m pip install --upgrade build
          python -m build
          ls -lh dist/

      - name: Publish to PyPI (trusted publisher)
        if: ${{ needs.verify.outputs.pypi_published != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          # password: ${{ secrets.PYPI_API_TOKEN }}  # uncomment to use a token instead of OIDC

  github-release:
    name: Create GitHub Release
    needs: [verify, publish-crates, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create / update the GitHub Release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="${{ needs.verify.outputs.version }}"
          TAG="v$VER"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; leaving it alone."
          else
            gh release create "$TAG" \
              --title "IronContext v$VER" \
              --notes "$(printf 'IronContext v%s.\n\n* crates.io: https://crates.io/crates/ironcontext-core/%s and https://crates.io/crates/ironcontext-cli/%s\n* PyPI: https://pypi.org/project/ironcontext/%s/\n\nSee CHANGELOG / commit history for details.\n' "$VER" "$VER" "$VER" "$VER")"
          fi
